name: Release
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  # --- 1. ビルドジョブ (並列実行) ---
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: "windows"
            artifact_name: "FileHasher-Windows-x86_64.zip"
          - os: macos-latest
            label: "macos-arm"
            artifact_name: "FileHasher_macOS_aarch64.zip"
          - os: macos-15-intel
            label: "macos-x86"
            artifact_name: "FileHasher_macOS_x86_64.zip"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ">=1.26.0"

      # Windows用のビルド設定
      - name: Setup msys2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        with:
          install: git mingw-w64-x86_64-toolchain zip
          path-type: inherit

      # 各OSでのビルド実行 (ファイル名はOSごとに分ける)
      - name: Build
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          fyne package

      - name: Packing application for Windows
        if: runner.os == 'Windows'
        run: zip -r ${{ matrix.artifact_name }} File\ Hasher.exe

      - name: Packing application for non-Windows
        if: runner.os != 'Windows'
        run: zip -r ${{ matrix.artifact_name }} ./File\ Hasher.app

      # 成果物を一時保存 (次のジョブに渡すため)
      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.artifact_name }}

  # --- 2. リリースジョブ (一括実行) ---
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ./artifacts
          merge-multiple: true # 全ジョブのファイルを1つのフォルダにまとめる

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v0.1.15
        with:
          files: ./artifacts/*
      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "./artifacts/*"
          generateReleaseNotes: true
          # immutableCreate: true
