name: Cross-Build Release (Universal)
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  # --- 1. macOS向けビルド (Universal Binary) ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.0"
      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build Universal macOS App
        run: |
          # 1. ARM64向けビルド
          GOARCH=arm64 fyne package -os darwin --executable FileHasher_arm64
          mv "File Hasher.app/Contents/MacOS/FileHasher_arm64" ./FileHasher_arm64_bin
          rm -rf "File Hasher.app"

          # 2. AMD64向けビルド
          GOARCH=amd64 fyne package -os darwin --executable FileHasher_amd64
          # この時点で .app フォルダが再生成される
          mv "File Hasher.app/Contents/MacOS/FileHasher_amd64" ./FileHasher_amd64_bin

          # 3. lipoで結合してUniversalバイナリを作成
          lipo -create -output "File Hasher.app/Contents/MacOS/File Hasher" ./FileHasher_arm64_bin ./FileHasher_amd64_bin

          # 不要な個別バイナリを削除
          rm "File Hasher.app/Contents/MacOS/FileHasher_amd64"
          rm ./FileHasher_arm64_bin ./FileHasher_amd64_bin

          # 4. ZIP化
          zip -r FileHasher_macOS_universal.zip "File Hasher.app"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-universal
          path: FileHasher_macOS_universal.zip

  # --- 2. Windows向けビルド ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.0"
      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build
        shell: pwsh
        run: |
          fyne package -os windows
          Compress-Archive -Path "File Hasher.exe" -DestinationPath "FileHasher-Windows-x86_64.zip"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-artifact
          path: FileHasher-Windows-x86_64.zip

  # --- 3. リリースジョブ ---
  release:
    permissions:
      contents: write
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
