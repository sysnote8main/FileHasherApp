name: Cross-Build Release (macOS Native)
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.0"

      - name: Install dependencies
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          # Windows向けクロスコンパイルに必要なMinGWをHomebrewでインストール
          brew install mingw-w64

      # --- 1. macOS (ARM64) のビルド ---
      - name: Build for macOS (arm64)
        run: |
          # GOARCHを指定してApple Silicon向けにビルド
          GOARCH=arm64 fyne package -os darwin
          zip -r FileHasher_macOS_aarch64.zip "File Hasher.app"
          rm -rf "File Hasher.app" # 次のビルドと混ざらないように削除

      # --- 2. macOS (x86_64) のビルド ---
      - name: Build for macOS (x86_64)
        run: |
          # GOARCHを指定してIntel Mac向けにビルド
          GOARCH=amd64 fyne package -os darwin
          zip -r FileHasher_macOS_x86_64.zip "File Hasher.app"
          rm -rf "File Hasher.app"

      # --- 3. Windows (x86_64) のビルド ---
      - name: Build for Windows
        run: |
          # FyneはMinGWが入っていれば -os windows だけで自動的にクロスコンパイルしてくれます
          fyne package -os windows
          zip -r FileHasher-Windows-x86_64.zip "File Hasher.exe"

      # --- 4. 一括リリース ---
      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            FileHasher_macOS_aarch64.zip
            FileHasher_macOS_x86_64.zip
            FileHasher-Windows-x86_64.zip
          generate_release_notes: true
