name: Build macOS Only
on:
  push:
    tags: ["*"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.0"
          cache: true

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build for macOS (arm64)
        run: |
          GOARCH=arm64 fyne package -os darwin
          zip -r FileHasher_macOS_arm64.zip "File Hasher.app"
          rm -rf "File Hasher.app"

      - name: Build for macOS (amd64)
        run: |
          GOARCH=amd64 fyne package -os darwin
          zip -r FileHasher_macOS_amd64.zip "File Hasher.app"
          rm -rf "File Hasher.app"

      # Artifactとして保存（ビルド成果物のバックアップ）
      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-binaries
          path: |
            FileHasher_macOS_arm64.zip
            FileHasher_macOS_amd64.zip
          retention-days: 7

      # タグが打たれた時のみリリースを作成
      - name: Create Release and Upload
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            FileHasher_macOS_arm64.zip
            FileHasher_macOS_amd64.zip
          generate_release_notes: true
