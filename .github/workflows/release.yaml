name: Cross-Build Release (Matrix)
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  # --- 1. macOS向けビルドジョブ ---
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.26.0"
      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build
        run: |
          GOARCH=${{ matrix.arch }} fyne package -os darwin
          zip -r FileHasher_macOS_${{ matrix.arch }}.zip "File Hasher.app"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: FileHasher_macOS_${{ matrix.arch}}.zip

  # --- 2. Windows向けビルドジョブ ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.26.0"
      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build
        run: |
          fyne package -os windows
          Compress-Archive -Path "File Hasher.exe" -DestinationPath "FileHasher-Windows-x86_64.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: FileHasher-Windows-x86_64.zip

  # --- 3. リリースジョブ ---
  release:
    permissions:
      contents: write
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true # 全てのファイルを一つのディレクトリに集める

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
