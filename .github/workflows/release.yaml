name: Cross-Build Release (Universal)
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  # --- 1. macOS向けビルド (Universal Binary) ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.0"
      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build Universal macOS App
        run: |
          # 1. 各アーキテクチャのバイナリを go build で直接作成（これが一番確実）
          # Fyneのメタデータを含めるために一回だけ普通にpackageして構造を作る
          fyne package -os darwin --executable FileHasher_temp

          # 2. 実行バイナリを削除して、個別に go build する
          rm "File Hasher.app/Contents/MacOS/FileHasher_temp"

          GOARCH=arm64 go build -o FileHasher_arm64 .
          GOARCH=amd64 go build -o FileHasher_amd64 .

          # 3. lipoで結合して、正しいバイナリ名で .app 内に配置
          # アプリ名が "File Hasher" の場合、バイナリ名もそれに合わせる
          lipo -create -output "File Hasher.app/Contents/MacOS/File Hasher" ./FileHasher_arm64 ./FileHasher_amd64

          # 4. Info.plist の実行バイナリ名を修正 (fyne package時の名前と合わせる)
          # --executableを指定しなかった場合、デフォルトはプロジェクト名かディレクトリ名
          # ここでは "File Hasher" に固定されるように調整

          # 5. 不要な一時バイナリを削除
          rm ./FileHasher_arm64 ./FileHasher_amd64

          # 6. ZIP化
          zip -r FileHasher_macOS_universal.zip "File Hasher.app"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-universal
          path: FileHasher_macOS_universal.zip

  # --- 2. Windows向けビルド ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.0"
      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest
      - name: Build
        shell: pwsh
        run: |
          fyne package -os windows
          Compress-Archive -Path "File Hasher.exe" -DestinationPath "FileHasher-Windows-x86_64.zip"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-artifact
          path: FileHasher-Windows-x86_64.zip

  # --- 3. リリースジョブ ---
  release:
    permissions:
      contents: write
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
