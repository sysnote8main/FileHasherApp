name: Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  # --- 1. ビルドジョブ (並列実行) ---
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: 'windows'
            artifact_name: 'FileHasher-Windows-x86_64.zip'
          - os: macos-latest
            label: 'macos-arm'
            artifact_name: 'FileHasher_macOS_aarch64.zip'
          - os: macos-13
            label: 'macos-x86'
            artifact_name: 'FileHasher_macOS_x86_64.zip'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.26.0'

      # Windows用のビルド設定
      - name: Setup msys2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: git mingw-w64-x86_64-toolchain zip
          path-type: inherit

      # 各OSでのビルド実行 (ファイル名はOSごとに分ける)
      - name: Build
        shell: runner.os == 'Windows'
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          fyne package
          if [ "${{ runner.os }}" = "Windows" ]; then
            zip -r ${{ matrix.artifact_name }} File\ Hasher.exe
          else
            zip -r ${{ matrix.artifact_name }} ./File\ Hasher.app
          fi

      # 成果物を一時保存 (次のジョブに渡すため)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.artifact_name }}

  # --- 2. リリースジョブ (一括実行) ---
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true # 全ジョブのファイルを1つのフォルダにまとめる

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/*"
          generateReleaseNotes: true
          # immutableCreate: true
